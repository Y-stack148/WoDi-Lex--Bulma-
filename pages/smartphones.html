<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphones | WoDi Lex</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Apuntamos correctamente al CSS que está en la raíz -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- ENCABEZADO Y NAVEGACIÓN UNIFICADA -->
    <header>
        <nav class="navbar is-dark is-fixed-top" aria-label="main navigation">
            <div class="container">
                <div class="navbar-brand">
                    <a class="navbar-item" href="../index.html">
                        <strong class="is-size-4">WoDi Lex</strong>
                    </a>
                    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarMain">
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                    </a>
                </div>

                <div id="navbarMain" class="navbar-menu">
                    <div class="navbar-start">
                        <a class="navbar-item" href="../index.html">Inicio</a>
                        <a class="navbar-item is-active" href="smartphones.html">Smartphones</a>
                        <a class="navbar-item" href="laptops.html">Laptops</a>
                        <a class="navbar-item" href="gadgets.html">Gadgets</a>
                        <!-- EFECTO 1: Indicador para la cápsula deslizante (Glow Pill) -->
                        <span class="nav-sliding-indicator"></span>
                    </div>

                    <div class="navbar-end">
                        <!-- Buscador -->
                        <div class="navbar-item">
                            <div class="field has-addons">
                                <div class="control">
                                    <input class="input is-small is-rounded" type="text" placeholder="Buscar...">
                                </div>
                                <div class="control">
                                    <button class="button is-small is-link is-rounded">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Acceso al Login -->
                        <div class="navbar-item">
                            <a href="login.html" class="button is-dark is-outlined is-inverted is-rounded">
                                <span class="icon"><i class="fas fa-user"></i></span>
                                <span>Ingresar</span>
                            </a>
                        </div>

                        <!-- Botón del Carrito -->
                        <div class="navbar-item">
                            <a href="carrito.html" class="button is-link is-inverted is-outlined is-rounded">
                                <span class="icon">
                                    <i class="fas fa-shopping-cart"></i>
                                </span>
                                <span id="cart-count">0</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- CONTENIDO DE PRODUCTOS -->
    <main class="section" style="margin-top: 3rem;">
        <div class="container">
            <h1 class="title is-2 has-text-centered mb-6">Nuestros Smartphones</h1>
            <div class="columns is-multiline">
                
                <!-- PRODUCTO 1: SAMSUNG -->
                <div class="column is-12-mobile is-6-tablet is-3-desktop">
                    <div class="card product-3d-card">
                        <div class="wrapper">
                            <img src="../assets/samsung.jpg" alt="Samsung S26 Ultra" class="product-img">
                        </div>
                        <div class="card-content has-text-centered product-info">
                            <p class="title is-5">Samsung S26 Ultra</p>
                            <p class="subtitle is-6 has-text-link mb-4">$26,399</p>
                            <button class="button is-link is-fullwidth is-soft">Agregar al carrito</button>
                        </div>
                    </div>
                </div>

                <!-- PRODUCTO 2: IPHONE -->
                <div class="column is-12-mobile is-6-tablet is-3-desktop">
                    <div class="card product-3d-card">
                        <div class="wrapper">
                            <img src="../assets/iphone.jpg" alt="Iphone 17 Pro Max" class="product-img">
                        </div>
                        <div class="card-content has-text-centered product-info">
                            <p class="title is-5">Iphone 17 Pro Max</p>
                            <p class="subtitle is-6 has-text-link mb-4">$29,989</p>
                            <button class="button is-link is-fullwidth is-soft">Agregar al carrito</button>
                        </div>
                    </div>
                </div>

                <!-- PRODUCTO 3: PIXEL -->
                <div class="column is-12-mobile is-6-tablet is-3-desktop">
                    <div class="card product-3d-card">
                        <div class="wrapper">
                            <img src="../assets/pixel.jpg" alt="Google Pixel 10 Pro XL" class="product-img">
                        </div>
                        <div class="card-content has-text-centered product-info">
                            <p class="title is-5">Google Pixel 10 Pro XL</p>
                            <p class="subtitle is-6 has-text-link mb-4">$25,699</p>
                            <button class="button is-link is-fullwidth is-soft">Agregar al carrito</button>
                        </div>
                    </div>
                </div>

                <!-- PRODUCTO 4: ONEPLUS -->
                <div class="column is-12-mobile is-6-tablet is-3-desktop">
                    <div class="card product-3d-card">
                        <div class="wrapper">
                            <img src="../assets/oneplus.jpg" alt="OnePlus 14 Pro" class="product-img">
                        </div>
                        <div class="card-content has-text-centered product-info">
                            <p class="title is-5">OnePlus 14 Pro</p>
                            <p class="subtitle is-6 has-text-link mb-4">$18,499</p>
                            <button class="button is-link is-fullwidth is-soft">Agregar al carrito</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer class="footer has-background-black has-text-grey-light mt-6">
        <div class="container content has-text-centered">
            <p>&copy; 2026 <strong>WoDi Lex</strong>. Todos los derechos reservados. Calidad e innovación garantizada.</p>
        </div>
    </footer>

    <!-- LLAMADA AL SCRIPT: Vinculado saliendo de la carpeta pages -->
    <script src="../script.js"></script>
</body>
</html>
